services:
  web:
    build: 
      context: ./web
    ports: 
      - "3000:3000"
    env_file: 
      - .env
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    depends_on: 
      - influxdb
      - redis
    restart: unless-stopped

  worker:
    build: 
      context: ./worker
    env_file: 
      - .env
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    depends_on: 
      - influxdb
      - redis
    restart: always

  influxdb:
    image: influxdb:2
    ports: 
      - "8086:8086"
    environment:
       DOCKER_INFLUXDB_INIT_MODE: setup
       DOCKER_INFLUXDB_INIT_USERNAME: admin
       DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword123
       DOCKER_INFLUXDB_INIT_ORG: central
       DOCKER_INFLUXDB_INIT_BUCKET: dashboard
       DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: admin-token-123
    volumes: 
      - "./influxdb_data:/var/lib/influxdb2"
    healthcheck:
      test: ["CMD", "curl", "-sI", "http://localhost:8086/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: 
      - "6379:6379"
    volumes: 
      - "./redis_data:/data"
